# Paste this via GitHub web: Add file -> Create new file -> name it exactly:
#   .github/workflows/claude.yml
# Prereqs: install the Claude GitHub App on the repo (github.com/apps/claude)
# and add repo secret ANTHROPIC_API_KEY (Settings -> Secrets -> Actions).
name: Claude Code
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
jobs:
  claude:
    if: contains(github.event.comment.body || github.event.issue.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
