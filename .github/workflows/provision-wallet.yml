name: Provision Agent Wallet (one-time)
on:
  workflow_dispatch:

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Create agent wallet (V1 API)
        env:
          DYNAMIC_BEARER_TOKEN: dyn_aSQYijSHt3aXBntDhYUj0BkMnj7bSBys9xUO29FOGihzpSSces1Pvt3L
          NEXT_PUBLIC_DYNAMIC_ENVIRONMENT_ID: c954ba86-98f3-4256-82ef-59e65a80acaa
          DYNAMIC_WALLET_PASSWORD: eps-agent-secure-pw-2026
        run: |
          node --input-type=module << 'EOF'
          import { DynamicEvmWalletClient } from '@dynamic-labs-wallet/node-evm';
          import { ThresholdSignatureScheme } from '@dynamic-labs-wallet/node';

          const authToken = process.env.DYNAMIC_BEARER_TOKEN;
          const environmentId = process.env.NEXT_PUBLIC_DYNAMIC_ENVIRONMENT_ID;
          const password = process.env.DYNAMIC_WALLET_PASSWORD;

          const client = new DynamicEvmWalletClient({ environmentId });
          await client.authenticateApiToken(authToken);

          const { walletMetadata, publicKeyHex, externalServerKeyShares } =
            await client.createWalletAccount({
              thresholdSignatureScheme: ThresholdSignatureScheme.TWO_OF_TWO,
              password,
              onError: (e) => { console.error('[Error]', e); process.exit(1); },
              backUpToDynamic: true,
            });

          const walletId = walletMetadata?.id ?? walletMetadata?.walletId ?? 'unknown';
          const address = walletMetadata?.accountAddress ?? publicKeyHex ?? 'unknown';
          console.log('SUCCESS');
          console.log('EPS_AGENT_WALLET_ID=' + walletId);
          console.log('EPS_AGENT_ADDRESS=' + address);
          EOF
