name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        # Use the CLI binary directly: gitleaks-action@v2 posts PR annotations
        # via the GitHub API and fails with 403 when GITHUB_TOKEN lacks that
        # permission. The CLI needs no API access.
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --exit-code 1 --no-git

